<!DOCTYPE html>

<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="建築師備考"/>
  <title>建築師考試備考計畫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#F9F7F4;font-family:'Noto Serif TC',Georgia,serif;}
    #root{min-height:100vh;}
    /* Login screen */
    #login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#F9F7F4;padding:24px;}
    .login-card{background:#fff;border-radius:20px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,0.10);}
    .login-logo{width:64px;height:64px;background:#C8956C;color:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;margin:0 auto 20px;}
    .login-title{font-size:20px;font-weight:900;color:#2C2C2C;margin-bottom:6px;}
    .login-sub{font-size:13px;color:#aaa;margin-bottom:32px;}
    .google-btn{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:14px 24px;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;color:#333;width:100%;transition:box-shadow .2s;}
    .google-btn:hover{box-shadow:0 2px 12px rgba(0,0,0,0.12);}
    .google-btn svg{width:20px;height:20px;flex-shrink:0;}
    /* Loading */
    #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:14px;color:#aaa;font-family:'Noto Serif TC',serif;}
    .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#C8956C;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    /* User avatar in header */
    .user-avatar{width:32px;height:32px;border-radius:50%;overflow:hidden;cursor:pointer;border:2px solid #C8956C44;flex-shrink:0;}
    .user-avatar img{width:100%;height:100%;object-fit:cover;}
    /* Sync indicator */
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#6B8F71;display:inline-block;margin-left:6px;vertical-align:middle;}
    .sync-dot.syncing{background:#C8956C;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div>載入中…</div>
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">建</div>
    <div class="login-title">建築師考試備考計畫</div>
    <div class="login-sub">專門職業及技術人員高等考試</div>
    <button class="google-btn" id="google-login-btn">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 帳號登入
    </button>
    <p style="margin-top:20px;font-size:11px;color:#ccc;">登入後資料將同步至雲端<br/>可在 iPhone、iPad、電腦同步使用</p>
  </div>
</div>
<div id="root" style="display:none"></div>

<!-- Firebase SDKs -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9F-aZ9mTSOjpDqFPv3ZpgyQIO1Ekfr68",
  authDomain: "architect-planner-9e9f8.firebaseapp.com",
  projectId: "architect-planner-9e9f8",
  storageBucket: "architect-planner-9e9f8.firebasestorage.app",
  messagingSenderId: "541936154768",
  appId: "1:541936154768:web:95d6917767c7f07a290015"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

function showLoading(){ document.getElementById("loading").style.display="flex"; document.getElementById("login-screen").style.display="none"; document.getElementById("root").style.display="none"; }
function showLogin(){ document.getElementById("loading").style.display="none"; document.getElementById("login-screen").style.display="flex"; document.getElementById("root").style.display="none"; }
function showApp(){ document.getElementById("loading").style.display="none"; document.getElementById("login-screen").style.display="none"; document.getElementById("root").style.display="block"; }

// Firebase load/save helpers exposed globally
async function fbLoad(uid) {
  try {
    const snap = await getDoc(doc(db,"users",uid,"data","main"));
    return snap.exists() ? snap.data() : null;
  } catch(e){ console.error("fbLoad error",e); return null; }
}
async function fbSave(uid, data) {
  try {
    // Split out drawing images to avoid 1MB Firestore limit
    const {drawingLog, ...rest} = data;
    // Save text data
    await setDoc(doc(db,"users",uid,"data","main"), rest);
    // Save drawing log (may have base64 images - chunk by day)
    if(drawingLog){
      await setDoc(doc(db,"users",uid,"data","drawingLog"), drawingLog);
    }
    window.__syncDot && window.__syncDot("done");
  } catch(e){ console.error("fbSave error",e); }
}

document.getElementById("google-login-btn").addEventListener("click", async()=>{
  try {
    showLoading();
    await signInWithPopup(auth, provider);
  } catch(e){
    console.error(e);
    showLogin();
    alert("登入失敗，請重試");
  }
});

onAuthStateChanged(auth, async(user)=>{
  if(user){
    showLoading();
    // Set global helpers
    window.__fbSave = (data) => fbSave(user.uid, data);
    window.__fbLoad = async () => {
      const main = await fbLoad(user.uid);
      if(!main) return null;
      // Load drawing log separately
      try {
        const dlSnap = await getDoc(doc(db,"users",user.uid,"data","drawingLog"));
        const drawingLog = dlSnap.exists() ? dlSnap.data() : {};
        return {...main, drawingLog};
      } catch(e){ return main; }
    };
    window.__fbUser = user;
    window.__fbSignOut = () => signOut(auth);
    showApp();
  } else {
    window.__fbSave = null;
    window.__fbLoad = null;
    window.__fbUser = null;
    showLogin();
  }
});
</script>

<!-- React + Babel -->

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react" src="./app.js"></script>

</body>
</html>
