<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F9F7F4;font-family:'Noto Serif TC',Georgia,serif}
#root{min-height:100vh}
#ls{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#F9F7F4;padding:24px}
.lc{background:#fff;border-radius:20px;padding:40px 32px;max-width:380px;width:100%;text-align:center;box-shadow:0 4px 40px rgba(0,0,0,.10)}
.ll{width:64px;height:64px;background:#C8956C;color:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;margin:0 auto 20px}
.lt{font-size:20px;font-weight:900;color:#2C2C2C;margin-bottom:6px}
.ls2{font-size:13px;color:#aaa;margin-bottom:32px}
.gb{display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:14px 24px;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;color:#333;width:100%}
.gb svg{width:20px;height:20px;flex-shrink:0}
#ld{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:14px;color:#aaa;font-family:'Noto Serif TC',serif}
.sp{width:32px;height:32px;border:3px solid #eee;border-top-color:#C8956C;border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

import{getAuth,GoogleAuthProvider,signInWithPopup,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getFirestore,doc,getDoc,setDoc}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyD9F-aZ9mTSOjpDqFPv3ZpgyQIO1Ekfr68',authDomain:'architect-planner-9e9f8.firebaseapp.com',projectId:'architect-planner-9e9f8',storageBucket:'architect-planner-9e9f8.firebasestorage.app',messagingSenderId:'541936154768',appId:'1:541936154768:web:95d6917767c7f07a290015'};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);const db=getFirestore(app);const gp=new GoogleAuthProvider();
const eld=document.getElementById('ld'),els=document.getElementById('ls'),er=document.getElementById('root');
function showLoad(){eld.style.display='flex';els.style.display='none';er.style.display='none'}
function showLogin(){eld.style.display='none';els.style.display='flex';er.style.display='none'}
function showApp(){eld.style.display='none';els.style.display='none';er.style.display='block'}
async function fbLoad(uid){try{const s=await getDoc(doc(db,'users',uid,'data','main'));if(!s.exists())return null;const m=s.data();try{const d=await getDoc(doc(db,'users',uid,'data','drawingLog'));return{...m,drawingLog:d.exists()?d.data():{}}}catch(e){return m}}catch(e){return null}}
async function fbSave(uid,data){try{const{drawingLog,...rest}=data;await setDoc(doc(db,'users',uid,'data','main'),rest);if(drawingLog)await setDoc(doc(db,'users',uid,'data','drawingLog'),drawingLog)}catch(e){console.error(e)}}
document.getElementById('glb').addEventListener('click',async()=>{try{showLoad();await signInWithPopup(auth,gp)}catch(e){console.error(e);showLogin();alert('登入失敗，請重試')}});
onAuthStateChanged(auth,async(user)=>{if(user){window.__fbSave=(d)=>fbSave(user.uid,d);window.__fbLoad=()=>fbLoad(user.uid);window.__fbUser=user;window.__fbSignOut=()=>signOut(auth);showApp()}else{window.__fbSave=null;window.__fbLoad=null;window.__fbUser=null;showLogin()}});
</script>
